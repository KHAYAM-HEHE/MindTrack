<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Two-Factor Authentication - MindWell</title>
<!-- Google Fonts: Manrope -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#e9ddff",
                        "background": "#f8f9ff",
                        "secondary-fixed-dim": "#d0bcff",
                        "primary-container": "#008378",
                        "on-background": "#0b1c30",
                        "secondary-container": "#8455ef",
                        "primary": "#00685f",
                        "tertiary-fixed-dim": "#ffb59a",
                        "tertiary": "#924628",
                        "surface-variant": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "on-secondary-fixed-variant": "#5516be",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-container": "#f4fffc",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-dim": "#cbdbf5",
                        "surface-container": "#e5eeff",
                        "error": "#ba1a1a",
                        "on-tertiary": "#ffffff",
                        "outline": "#6d7a77",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffdbce",
                        "primary-fixed-dim": "#6bd8cb",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "primary-fixed": "#89f5e7",
                        "on-surface-variant": "#3d4947",
                        "on-error-container": "#93000a",
                        "surface-tint": "#006a61",
                        "on-tertiary-fixed": "#370e00",
                        "tertiary-container": "#b05e3d",
                        "outline-variant": "#bcc9c6",
                        "surface-container-low": "#eff4ff",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#6bd8cb",
                        "surface-bright": "#f8f9ff",
                        "secondary": "#6b38d4",
                        "on-secondary-container": "#fffbff",
                        "inverse-surface": "#213145",
                        "surface": "#f8f9ff",
                        "on-primary-fixed-variant": "#005049",
                        "on-tertiary-fixed-variant": "#773215",
                        "on-primary-fixed": "#00201d",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "on-secondary-fixed": "#23005c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "2rem",
                        "unit": "4px",
                        "md": "1.5rem",
                        "gutter": "1.5rem",
                        "xl": "3rem",
                        "xs": "0.5rem",
                        "container-max": "1280px",
                        "sm": "1rem"
                    },
                    "fontFamily": {
                        "h1": ["Manrope"],
                        "display": ["Manrope"],
                        "h2": ["Manrope"],
                        "body-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "label-sm": ["Manrope"],
                        "label-md": ["Manrope"],
                        "h3": ["Manrope"]
                    },
                    "fontSize": {
                        "h1": ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "h2": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.75", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "h3": ["20px", { "lineHeight": "1.5", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Base styles mapped to tokens */
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f8f9ff; /* bg-background */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle diffuse shadow for the card as per design guidelines */
        .ambient-shadow {
            box-shadow: 0 4px 24px rgba(100, 116, 139, 0.06), 0 1px 3px rgba(100, 116, 139, 0.04);
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 antialiased">
<!-- 
      TRANSACTIONAL PAGE CONTEXT:
      Navigation shell (TopAppBar/SideNav) is intentionally suppressed here 
      as this is a linear authentication flow preventing users from proceeding 
      until verification is complete. Focus remains entirely on the canvas.
    -->
<main class="w-full max-w-[460px] flex flex-col items-center">
<!-- Brand Header Context -->
<div class="flex items-center gap-3 mb-10">
<div class="w-10 h-10 bg-surface-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl fill">spa</span>
</div>
<span class="font-h3 text-h3 text-on-surface tracking-tight">MindWell</span>
</div>
<!-- 2FA Card -->
<div class="bg-surface-container-lowest w-full rounded-[1.25rem] p-8 md:p-10 ambient-shadow flex flex-col items-center relative overflow-hidden">
<!-- Subtle decorative background element for depth -->
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-surface-container-low to-transparent opacity-50 pointer-events-none"></div>
<div class="w-14 h-14 bg-surface-container rounded-full flex items-center justify-center mb-6 relative z-10">
<span class="material-symbols-outlined text-primary text-3xl">shield_lock</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-3 text-center relative z-10">Two-Step Verification</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-10 relative z-10 px-2">
                Enter the 6-digit security code generated by your authenticator app to continue.
            </p>
<form class="w-full flex flex-col relative z-10">
<!-- 6-Digit Input Field Group -->
<div class="flex justify-between gap-2 sm:gap-3 mb-10 w-full" dir="ltr">
<input aria-label="Digit 1" autofocus="" class="w-12 h-14 sm:w-14 sm:h-16 bg-surface-bright border border-outline rounded-xl text-center font-h2 text-h2 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 2" class="w-12 h-14 sm:w-14 sm:h-16 bg-surface-bright border border-outline rounded-xl text-center font-h2 text-h2 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 3" class="w-12 h-14 sm:w-14 sm:h-16 bg-surface-bright border border-outline rounded-xl text-center font-h2 text-h2 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 4" class="w-12 h-14 sm:w-14 sm:h-16 bg-surface-bright border border-outline rounded-xl text-center font-h2 text-h2 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 5" class="w-12 h-14 sm:w-14 sm:h-16 bg-surface-bright border border-outline rounded-xl text-center font-h2 text-h2 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="Digit 6" class="w-12 h-14 sm:w-14 sm:h-16 bg-surface-bright border border-outline rounded-xl text-center font-h2 text-h2 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl hover:bg-on-primary-fixed-variant transition-colors shadow-sm mb-8 flex justify-center items-center gap-2" type="button">
                    Verify Code
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Secondary Actions / Recovery -->
<div class="flex flex-col items-center gap-5 w-full border-t border-outline-variant/50 pt-8">
<div class="flex items-center gap-2">
<span class="font-body-md text-body-md text-on-surface-variant text-sm">Didn't receive a code?</span>
<button class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors" type="button">
                            Resend Code
                        </button>
</div>
<button class="font-label-md text-label-md text-secondary hover:text-on-secondary-fixed-variant transition-colors flex items-center gap-2 mt-2 px-4 py-2 rounded-lg hover:bg-secondary-fixed/50" type="button">
<span class="material-symbols-outlined text-[18px]">key</span>
                        Use Backup Code
                    </button>
</div>
</form>
</div>
<!-- Footer / Support Context -->
<div class="mt-8 text-center">
<a class="font-label-sm text-label-sm text-outline hover:text-on-surface transition-colors flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]">help</span>
                Need help accessing your account?
            </a>
</div>
</main>
</body></html>

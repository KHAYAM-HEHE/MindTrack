<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-body-md text-on-background relative overflow-hidden">
<!-- Ambient Background Gradients for Calming Effect -->
<div class="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] bg-surface-variant rounded-full blur-[100px] opacity-40 z-0 pointer-events-none"></div>
<div class="absolute bottom-[-15%] right-[-10%] w-[40%] h-[40%] bg-secondary-fixed rounded-full blur-[100px] opacity-30 z-0 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-md z-10 relative">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_24px_rgba(100,116,139,0.08)] p-xl w-full flex flex-col gap-lg border border-surface-container-highest">
<!-- Header Section -->
<header class="flex flex-col items-center text-center gap-sm">
<!-- Brand Icon -->
<div class="w-12 h-12 bg-surface-container-low rounded-xl flex items-center justify-center text-primary mb-xs">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface">Reset your password</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">
                    Enter the email address associated with your MindWell account, and we'll send you a secure link to create a new password.
                </p>
</header>
<!-- Recovery Form -->
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs relative">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-background placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all duration-200 font-body-md text-body-md" id="email" placeholder="hello@example.com" required="" type="email"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full py-3 px-6 bg-primary text-on-primary rounded-lg font-label-md text-label-md hover:bg-surface-tint active:scale-[0.98] transition-all duration-200 mt-sm flex items-center justify-center gap-xs shadow-sm" type="submit">
                    Send Recovery Link
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer & Secondary Actions -->
<footer class="flex flex-col items-center gap-md mt-sm border-t border-surface-container pt-md">
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors flex items-center gap-xs" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Back to Login
                </a>
<div class="flex items-center gap-xs text-on-surface-variant font-label-sm text-label-sm bg-surface-container-low px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-[16px]">support_agent</span>
<span>Need help? <a class="text-primary hover:underline font-label-md text-label-md ml-1" href="#">Contact Support</a></span>
</div>
</footer>
</div>
</main>
